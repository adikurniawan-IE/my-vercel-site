<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration Form</title>
</head>
<body>
  <form id="registration-form">
    Name: <input type="text" id="name-input" /><br/>
    <span id="name-error"></span>
    Email: <input type="text" id="email-input" /><br/>
    <span id="email-error"></span>
    Mobile: <input type="text" id="mobile-input" /><br/>
    <span id="mobile-error"></span>
    <button type="submit" id="submit-button">Register</button>
  </form>
  <p id="success-message"></p>

  <script>
    document.getElementById('registration-form').addEventListener('submit', function (event) {
      event.preventDefault();

      var name   = document.getElementById('name-input').value.trim();
      var email  = document.getElementById('email-input').value.trim();
      var mobile = document.getElementById('mobile-input').value.trim();

      var nameError   = document.getElementById('name-error');
      var emailError  = document.getElementById('email-error');
      var mobileError = document.getElementById('mobile-error');
      var success     = document.getElementById('success-message');

      nameError.textContent   = '';
      emailError.textContent  = '';
      mobileError.textContent = '';
      success.textContent     = '';

      var valid = true;

      // BUG 1 — accepts single-character names (should be >= 2, not >= 1)
      // Fails test 5: name="A" should show an error but doesn't
      if (name.length < 1) {
        nameError.textContent = 'Name is required.';
        valid = false;
      }

      // Email: required, valid format (correct)
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.textContent = 'Please enter a valid email address.';
        valid = false;
      }

      // BUG 2 — only checks length, not the "04" prefix
      // Fails test 3: mobile="0312345678" is 10 digits but should be rejected
      if (!/^\d{10}$/.test(mobile)) {
        mobileError.textContent = 'Mobile must be exactly 10 digits.';
        valid = false;
      }

      if (valid) {
        success.textContent = 'Registration successful';
      }
    });
  </script>
</body>
</html>
